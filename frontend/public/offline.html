<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#101214" />
    <title>Barbearia Premium | Offline</title>
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at 20% 20%, rgba(198, 164, 106, 0.14), transparent 40%), #101214;
        color: #f1f5f9;
        font-family: Inter, Segoe UI, sans-serif;
        padding: 24px;
      }
      .card {
        max-width: 420px;
        width: 100%;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(30, 35, 42, 0.9);
        border-radius: 16px;
        padding: 20px;
      }
      h1 {
        margin: 0 0 12px;
        font-size: 1.5rem;
      }
      p {
        margin: 0;
        line-height: 1.5;
        color: #cbd5e1;
      }
    </style>
  </head>
  <body>
    <section class="card">
      <h1>Voce esta offline</h1>
      <p>Abra o app novamente quando a conexao voltar para sincronizar agenda, financeiro e assinaturas.</p>
    </section>
  </body>
</html>
